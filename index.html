<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppRepo — Your Toolbox</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hero Section -->
  <header class="hero">
    <div class="hero-inner">
      <h1 class="hero-title">Mini alati na jednom mjestu</h1>
      <p class="hero-subtitle">Brzi pristup aplikacijama — jednostavno, brzo i besplatno.</p>
      <a href="#tools" class="hero-cta">Istraži alate ↓</a>
    </div>
  </header>

  <!-- Search & Filters -->
  <section class="controls" id="tools">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Pretraži alate…" autocomplete="off">
    </div>
    <div class="category-filters" id="categoryFilters">
      <button class="cat-btn active" data-category="all">Sve</button>
      <button class="cat-btn" data-category="health">Zdravlje</button>
      <button class="cat-btn" data-category="finance">Financije</button>
    </div>
  </section>

  <!-- Favorites -->
  <section class="favorites-section" id="favoritesSection" hidden>
    <h2 class="section-heading">⭐ Favoriti</h2>
    <div class="tool-grid" id="favoritesGrid"></div>
  </section>

  <!-- Tool Grid -->
  <section class="tools-section">
    <div class="tool-grid" id="toolGrid"></div>
    <p class="no-results" id="noResults" hidden>No tools match your search.</p>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 AppRepo. All rights reserved.</p>
    <nav class="footer-links">
      <a href="#">GitHub</a>
      <a href="#">Contact</a>
    </nav>
  </footer>

  <script src="app.js"></script>
</body>
</html>
